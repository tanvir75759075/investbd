<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>InvestBD - Profile</title>
  <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
  <style>
    :root{--gold:#f5c518;--gold-light:#ffd84d;--gold-dark:#c9a000;--dark:#0a0a0f;--dark2:#111118;--text:#e8e8f0;--text-muted:#888899;--success:#00e676;--error:#ff5252;--border:rgba(245,197,24,0.15);--sidebar-w:260px;}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Hind Siliguri',sans-serif;background:var(--dark);color:var(--text);min-height:100vh;display:flex;}
    .sidebar{width:var(--sidebar-w);background:var(--dark2);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:100;transition:transform 0.3s;}
    .sidebar-logo{padding:24px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;}
    .sidebar-logo .logo-icon{width:42px;height:42px;background:linear-gradient(135deg,var(--gold),var(--gold-dark));border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;}
    .sidebar-logo .logo-text{font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:800;background:linear-gradient(135deg,var(--gold-light),var(--gold-dark));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
    .sidebar-user{padding:20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;}
    .avatar{width:44px;height:44px;background:linear-gradient(135deg,var(--gold),var(--gold-dark));border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:#000;flex-shrink:0;}
    .sidebar-nav{flex:1;padding:16px 12px;overflow-y:auto;}
    .nav-section{margin-bottom:24px;}
    .nav-section-title{font-size:0.68rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:1.5px;padding:0 8px;margin-bottom:8px;}
    .nav-item{display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:10px;cursor:pointer;transition:all 0.2s;color:var(--text-muted);font-size:0.88rem;font-weight:500;margin-bottom:2px;text-decoration:none;}
    .nav-item i{width:18px;text-align:center;font-size:15px;}
    .nav-item:hover{background:rgba(245,197,24,0.06);color:var(--text);}
    .nav-item.active{background:rgba(245,197,24,0.1);color:var(--gold);border:1px solid rgba(245,197,24,0.15);}
    .sidebar-bottom{padding:16px 12px;border-top:1px solid var(--border);}
    .logout-btn{display:flex;align-items:center;gap:10px;padding:11px 12px;border-radius:10px;cursor:pointer;color:var(--error);font-size:0.88rem;font-weight:500;width:100%;background:none;border:none;font-family:'Hind Siliguri',sans-serif;}
    .logout-btn:hover{background:rgba(255,82,82,0.08);}
    .main{margin-left:var(--sidebar-w);flex:1;display:flex;flex-direction:column;}
    .topbar{background:rgba(17,17,24,0.95);border-bottom:1px solid var(--border);padding:0 28px;height:64px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;backdrop-filter:blur(10px);}
    .topbar-left{display:flex;align-items:center;gap:12px;}
    .menu-toggle{display:none;background:none;border:none;color:var(--text);font-size:20px;cursor:pointer;}
    .page-title{font-size:1.1rem;font-weight:600;}
    .content{padding:28px;max-width:860px;}
    @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
    .profile-hero{background:linear-gradient(135deg,rgba(245,197,24,0.08),rgba(245,197,24,0.02));border:1px solid var(--border);border-radius:16px;padding:28px;margin-bottom:24px;display:flex;align-items:center;gap:24px;animation:fadeUp 0.5s ease both;flex-wrap:wrap;}
    .profile-avatar-big{width:80px;height:80px;background:linear-gradient(135deg,var(--gold),var(--gold-dark));border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:2rem;font-weight:700;color:#000;flex-shrink:0;box-shadow:0 0 30px rgba(245,197,24,0.3);}
    .profile-info{flex:1;}
    .profile-name{font-size:1.3rem;font-weight:700;margin-bottom:4px;}
    .profile-meta{font-size:0.82rem;color:var(--text-muted);display:flex;gap:16px;flex-wrap:wrap;margin-top:6px;}
    .profile-meta span{display:flex;align-items:center;gap:5px;}
    .profile-meta i{color:var(--gold);font-size:12px;}
    .member-badge{padding:4px 14px;background:linear-gradient(135deg,var(--gold),var(--gold-dark));border-radius:20px;color:#000;font-size:0.72rem;font-weight:700;margin-top:10px;display:inline-block;}
    .profile-stats{display:flex;gap:20px;flex-wrap:wrap;}
    .p-stat{text-align:center;padding:12px 20px;background:rgba(0,0,0,0.2);border-radius:10px;border:1px solid rgba(255,255,255,0.05);}
    .p-stat .val{font-size:1.1rem;font-weight:700;color:var(--gold);}
    .p-stat .lbl{font-size:0.7rem;color:var(--text-muted);margin-top:3px;}
    .profile-tabs{display:flex;gap:4px;background:var(--dark2);border:1px solid var(--border);border-radius:12px;padding:4px;margin-bottom:24px;}
    .ptab{flex:1;padding:10px;text-align:center;border-radius:9px;cursor:pointer;font-size:0.85rem;font-weight:600;color:var(--text-muted);transition:all 0.2s;}
    .ptab.active{background:rgba(245,197,24,0.1);color:var(--gold);border:1px solid rgba(245,197,24,0.15);}
    .tab-panel{display:none;animation:fadeUp 0.4s ease both;}
    .tab-panel.active{display:block;}
    .form-card{background:var(--dark2);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:20px;}
    .form-card-header{padding:16px 20px;border-bottom:1px solid var(--border);font-size:0.92rem;font-weight:600;display:flex;align-items:center;gap:8px;}
    .form-card-header i{color:var(--gold);}
    .form-card-body{padding:22px;}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
    .form-group{margin-bottom:18px;}
    .form-group label{display:block;font-size:0.78rem;color:var(--text-muted);margin-bottom:7px;font-weight:500;}
    .input-wrap{position:relative;}
    .input-wrap i{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:13px;pointer-events:none;transition:color 0.3s;}
    .input-wrap input{width:100%;padding:12px 14px 12px 40px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:10px;color:var(--text);font-family:'Hind Siliguri',sans-serif;font-size:0.9rem;outline:none;transition:all 0.3s;}
    .input-wrap input:focus{border-color:var(--gold);background:rgba(245,197,24,0.04);}
    .input-wrap:focus-within i{color:var(--gold);}
    .input-wrap input[readonly]{background:rgba(255,255,255,0.02);color:var(--text-muted);cursor:not-allowed;}
    .save-btn{padding:12px 28px;background:linear-gradient(135deg,var(--gold),var(--gold-dark));border:none;border-radius:10px;color:#000;font-family:'Hind Siliguri',sans-serif;font-size:0.9rem;font-weight:700;cursor:pointer;transition:all 0.2s;}
    .save-btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(245,197,24,0.3);}
    .alert{padding:12px 14px;border-radius:8px;font-size:0.82rem;margin-bottom:16px;display:none;align-items:center;gap:8px;}
    .alert.success{background:rgba(0,230,118,0.1);border:1px solid rgba(0,230,118,0.2);color:var(--success);display:flex;}
    .alert.error{background:rgba(255,82,82,0.1);border:1px solid rgba(255,82,82,0.2);color:var(--error);display:flex;}
    .spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(0,0,0,0.3);border-top-color:#000;border-radius:50%;animation:spin 0.7s linear infinite;margin-right:6px;vertical-align:middle;}
    @keyframes spin{to{transform:rotate(360deg)}}
    .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:99;}
    .overlay.show{display:block;}
    @media(max-width:768px){.sidebar{transform:translateX(-100%);}.sidebar.open{transform:translateX(0);}.main{margin-left:0;}.menu-toggle{display:block;}.content{padding:16px;}.form-row{grid-template-columns:1fr;}.profile-hero{flex-direction:column;text-align:center;}.profile-meta{justify-content:center;}.profile-stats{justify-content:center;}.ptab{font-size:0.75rem;padding:8px 6px;}}
  </style>
</head>
<body>
<div class="overlay" id="overlay" onclick="closeSidebar()"></div>
<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo"><div class="logo-icon">💰</div><div class="logo-text">InvestBD</div></div>
  <div class="sidebar-user"><div class="avatar" id="sb-avatar">?</div><div><div style="font-size:0.9rem;font-weight:600;" id="sb-name">লোড...</div></div></div>
  <nav class="sidebar-nav">
    <div class="nav-section">
      <div class="nav-section-title">মূল মেনু</div>
      <a href="dashboard.html" class="nav-item"><i class="fas fa-th-large"></i> Dashboard</a>
      <a href="plans.html" class="nav-item"><i class="fas fa-layer-group"></i> Investment Plans</a>
      <a href="deposit.html" class="nav-item"><i class="fas fa-arrow-down-to-line"></i> Deposit</a>
      <a href="withdraw.html" class="nav-item"><i class="fas fa-arrow-up-from-line"></i> Withdraw</a>
    </div>
    <div class="nav-section">
      <div class="nav-section-title">আরও</div>
      <a href="referral.html" class="nav-item"><i class="fas fa-users"></i> Referral</a>
      <a href="profile.html" class="nav-item active"><i class="fas fa-user-circle"></i> Profile</a>
      <a href="support.html" class="nav-item"><i class="fas fa-headset"></i> Support</a>
    </div>
  </nav>
  <div class="sidebar-bottom"><button class="logout-btn" id="logout-btn"><i class="fas fa-sign-out-alt"></i> লগআউট</button></div>
</aside>
<div class="main">
  <div class="topbar">
    <div class="topbar-left"><button class="menu-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button><div class="page-title">আমার Profile</div></div>
  </div>
  <div class="content">
    <div class="profile-hero">
      <div class="profile-avatar-big" id="big-avatar">?</div>
      <div class="profile-info">
        <div class="profile-name" id="p-name-show">লোড হচ্ছে...</div>
        <div class="member-badge">⭐ Member</div>
        <div class="profile-meta">
          <span><i class="fas fa-mobile-alt"></i> <span id="p-phone-show">—</span></span>
          <span><i class="fas fa-envelope"></i> <span id="p-email-show">—</span></span>
          <span><i class="fas fa-calendar"></i> যোগদান: <span id="p-join-show">—</span></span>
        </div>
      </div>
      <div class="profile-stats">
        <div class="p-stat"><div class="val" id="ps-earned">৳০</div><div class="lbl">মোট আয়</div></div>
        <div class="p-stat"><div class="val" id="ps-ref">০ জন</div><div class="lbl">Referral</div></div>
      </div>
    </div>
    <div class="profile-tabs">
      <div class="ptab active" onclick="switchTab('info')"><i class="fas fa-user"></i> তথ্য</div>
      <div class="ptab" onclick="switchTab('password')"><i class="fas fa-lock"></i> পাসওয়ার্ড</div>
      <div class="ptab" onclick="switchTab('payment')"><i class="fas fa-mobile-alt"></i> Payment</div>
    </div>

    <!-- Info Tab -->
    <div class="tab-panel active" id="tab-info">
      <div class="form-card">
        <div class="form-card-header"><i class="fas fa-user-edit"></i> তথ্য সম্পাদনা করুন</div>
        <div class="form-card-body">
          <div class="alert" id="info-alert"></div>
          <div class="form-row">
            <div class="form-group"><label>পুরো নাম</label><div class="input-wrap"><i class="fas fa-user"></i><input type="text" id="p-name" placeholder="নাম"/></div></div>
            <div class="form-group"><label>মোবাইল নম্বর</label><div class="input-wrap"><i class="fas fa-mobile-alt"></i><input type="tel" id="p-phone" placeholder="01XXXXXXXXX"/></div></div>
          </div>
          <div class="form-group"><label>ইমেইল (পরিবর্তনযোগ্য নয়)</label><div class="input-wrap"><i class="fas fa-envelope"></i><input type="email" id="p-email" readonly/></div></div>
          <div class="form-group"><label>User ID</label><div class="input-wrap"><i class="fas fa-id-card"></i><input type="text" id="p-uid" readonly/></div></div>
          <button class="save-btn" onclick="saveInfo()"><i class="fas fa-save"></i> সংরক্ষণ করুন</button>
        </div>
      </div>
    </div>

    <!-- Password Tab -->
    <div class="tab-panel" id="tab-password">
      <div class="form-card">
        <div class="form-card-header"><i class="fas fa-key"></i> পাসওয়ার্ড পরিবর্তন করুন</div>
        <div class="form-card-body">
          <div class="alert" id="pw-alert"></div>
          <div class="form-group"><label>নতুন পাসওয়ার্ড</label><div class="input-wrap"><i class="fas fa-lock"></i><input type="password" id="pw-new" placeholder="নতুন পাসওয়ার্ড (কমপক্ষে ৬ অক্ষর)"/></div></div>
          <div class="form-group"><label>পাসওয়ার্ড নিশ্চিত করুন</label><div class="input-wrap"><i class="fas fa-lock"></i><input type="password" id="pw-confirm" placeholder="আবার লিখুন"/></div></div>
          <button class="save-btn" id="pw-btn" onclick="changePassword()"><i class="fas fa-key"></i> পাসওয়ার্ড পরিবর্তন করুন</button>
        </div>
      </div>
    </div>

    <!-- Payment Tab -->
    <div class="tab-panel" id="tab-payment">
      <div class="form-card">
        <div class="form-card-header"><i class="fas fa-mobile-alt"></i> Payment তথ্য</div>
        <div class="form-card-body">
          <div class="alert" id="pay-alert"></div>
          <div style="font-size:0.8rem;color:#ffab40;margin-bottom:16px;padding:10px 14px;background:rgba(255,171,64,0.07);border:1px solid rgba(255,171,64,0.2);border-radius:8px;"><i class="fas fa-info-circle"></i> এই তথ্য Withdraw করার সময় ব্যবহার হবে।</div>
          <div class="form-row">
            <div class="form-group"><label>bKash নম্বর</label><div class="input-wrap"><i class="fas fa-mobile-alt" style="color:#e2136e;"></i><input type="tel" id="pay-bkash" placeholder="bKash নম্বর"/></div></div>
            <div class="form-group"><label>Nagad নম্বর</label><div class="input-wrap"><i class="fas fa-mobile-alt" style="color:#f7941d;"></i><input type="tel" id="pay-nagad" placeholder="Nagad নম্বর"/></div></div>
          </div>
          <div class="form-row">
            <div class="form-group"><label>Rocket নম্বর</label><div class="input-wrap"><i class="fas fa-mobile-alt" style="color:#8b3db8;"></i><input type="tel" id="pay-rocket" placeholder="Rocket নম্বর"/></div></div>
            <div class="form-group"><label>Account holder নাম</label><div class="input-wrap"><i class="fas fa-user"></i><input type="text" id="pay-acname" placeholder="নাম"/></div></div>
          </div>
          <button class="save-btn" onclick="savePayment()"><i class="fas fa-save"></i> সংরক্ষণ করুন</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut, updatePassword } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";
  import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCu-UBa4vCRLByPkQqlb5JjVvuHqMFPYxM",
    authDomain: "investbd-783df.firebaseapp.com",
    projectId: "investbd-783df",
    storageBucket: "investbd-783df.firebasestorage.app",
    messagingSenderId: "1043148979663",
    appId: "1:1043148979663:web:20465ee152597ce101e6ba"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  let currentUser = null;

  onAuthStateChanged(auth, async user => {
    if(!user){window.location.href='index.html';return;}
    currentUser = user;
    const snap = await getDoc(doc(db,'users',user.uid));
    if(snap.exists()){
      const d = snap.data();
      const letter = d.name.charAt(0).toUpperCase();
      document.getElementById('sb-avatar').textContent = letter;
      document.getElementById('sb-name').textContent = d.name;
      document.getElementById('big-avatar').textContent = letter;
      document.getElementById('p-name-show').textContent = d.name;
      document.getElementById('p-phone-show').textContent = d.phone||'—';
      document.getElementById('p-email-show').textContent = d.email;
      document.getElementById('p-join-show').textContent = d.joinDate ? new Date(d.joinDate).toLocaleDateString('bn-BD') : '—';
      document.getElementById('ps-earned').textContent = '৳'+(d.totalEarned||0).toLocaleString();
      document.getElementById('ps-ref').textContent = (d.referralCount||0)+' জন';
      document.getElementById('p-name').value = d.name||'';
      document.getElementById('p-phone').value = d.phone||'';
      document.getElementById('p-email').value = d.email||'';
      document.getElementById('p-uid').value = user.uid.substring(0,16)+'...';
      document.getElementById('pay-bkash').value = d.bkash||'';
      document.getElementById('pay-nagad').value = d.nagad||'';
      document.getElementById('pay-rocket').value = d.rocket||'';
      document.getElementById('pay-acname').value = d.paymentName||'';
    }
  });

  document.getElementById('logout-btn').addEventListener('click', async()=>{await signOut(auth);window.location.href='index.html';});

  window.switchTab = function(tab){
    document.querySelectorAll('.ptab').forEach(t=>t.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
    const tabs=['info','password','payment'];
    document.querySelectorAll('.ptab')[tabs.indexOf(tab)].classList.add('active');
    document.getElementById('tab-'+tab).classList.add('active');
  }

  function showAlert(id,type,msg){
    const el=document.getElementById(id);
    el.className='alert '+type;
    el.innerHTML=(type==='success'?'<i class="fas fa-check-circle"></i>':'<i class="fas fa-exclamation-circle"></i>')+' '+msg;
    setTimeout(()=>{el.className='alert';},4000);
  }

  window.saveInfo = async function(){
    const name = document.getElementById('p-name').value.trim();
    const phone = document.getElementById('p-phone').value.trim();
    if(!name||!phone){showAlert('info-alert','error','সব তথ্য পূরণ করুন।');return;}
    try {
      await updateDoc(doc(db,'users',currentUser.uid),{name,phone});
      document.getElementById('p-name-show').textContent = name;
      document.getElementById('p-phone-show').textContent = phone;
      document.getElementById('sb-name').textContent = name;
      showAlert('info-alert','success','তথ্য সফলভাবে সংরক্ষণ হয়েছে!');
    } catch(e){ showAlert('info-alert','error','সমস্যা হয়েছে।'); }
  }

  window.changePassword = async function(){
    const nw = document.getElementById('pw-new').value;
    const cf = document.getElementById('pw-confirm').value;
    const btn = document.getElementById('pw-btn');
    if(!nw||!cf){showAlert('pw-alert','error','সব ঘর পূরণ করুন।');return;}
    if(nw.length<6){showAlert('pw-alert','error','পাসওয়ার্ড কমপক্ষে ৬ অক্ষরের হতে হবে।');return;}
    if(nw!==cf){showAlert('pw-alert','error','পাসওয়ার্ড দুটি মিলছে না।');return;}
    btn.innerHTML='<span class="spinner"></span> পরিবর্তন হচ্ছে...';
    try {
      await updatePassword(currentUser, nw);
      showAlert('pw-alert','success','পাসওয়ার্ড সফলভাবে পরিবর্তন হয়েছে!');
      document.getElementById('pw-new').value='';
      document.getElementById('pw-confirm').value='';
    } catch(e){
      showAlert('pw-alert','error','পুনরায় login করে চেষ্টা করুন।');
    }
    btn.innerHTML='<i class="fas fa-key"></i> পাসওয়ার্ড পরিবর্তন করুন';
  }

  window.savePayment = async function(){
    try {
      await updateDoc(doc(db,'users',currentUser.uid),{
        bkash: document.getElementById('pay-bkash').value.trim(),
        nagad: document.getElementById('pay-nagad').value.trim(),
        rocket: document.getElementById('pay-rocket').value.trim(),
        paymentName: document.getElementById('pay-acname').value.trim()
      });
      showAlert('pay-alert','success','Payment তথ্য সংরক্ষণ হয়েছে!');
    } catch(e){ showAlert('pay-alert','error','সমস্যা হয়েছে।'); }
  }

  window.toggleSidebar=()=>{document.getElementById('sidebar').classList.toggle('open');document.getElementById('overlay').classList.toggle('show');}
  window.closeSidebar=()=>{document.getElementById('sidebar').classList.remove('open');document.getElementById('overlay').classList.remove('show');}
</script>
</body>
