<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>InvestBD - Daily Tasks</title>
  <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
  <style>
    :root{--gold:#f5c518;--gold-light:#ffd84d;--gold-dark:#c9a000;--dark:#0a0a0f;--dark2:#111118;--dark3:#1a1a25;--text:#e8e8f0;--text-muted:#888899;--success:#00e676;--error:#ff5252;--warning:#ffab40;--border:rgba(245,197,24,0.15);--sidebar-w:260px;}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Hind Siliguri',sans-serif;background:var(--dark);color:var(--text);min-height:100vh;display:flex;}
    .sidebar{width:var(--sidebar-w);background:var(--dark2);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:100;transition:transform 0.3s;}
    .sidebar-logo{padding:24px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;}
    .sidebar-logo .logo-icon{width:42px;height:42px;background:linear-gradient(135deg,var(--gold),var(--gold-dark));border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;}
    .sidebar-logo .logo-text{font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:800;background:linear-gradient(135deg,var(--gold-light),var(--gold-dark));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
    .sidebar-user{padding:20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;}
    .avatar{width:44px;height:44px;background:linear-gradient(135deg,var(--gold),var(--gold-dark));border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:#000;flex-shrink:0;}
    .sidebar-nav{flex:1;padding:16px 12px;overflow-y:auto;}
    .nav-section{margin-bottom:24px;}
    .nav-section-title{font-size:0.68rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:1.5px;padding:0 8px;margin-bottom:8px;}
    .nav-item{display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:10px;cursor:pointer;transition:all 0.2s;color:var(--text-muted);font-size:0.88rem;font-weight:500;margin-bottom:2px;text-decoration:none;}
    .nav-item i{width:18px;text-align:center;font-size:15px;}
    .nav-item:hover{background:rgba(245,197,24,0.06);color:var(--text);}
    .nav-item.active{background:rgba(245,197,24,0.1);color:var(--gold);border:1px solid rgba(245,197,24,0.15);}
    .sidebar-bottom{padding:16px 12px;border-top:1px solid var(--border);}
    .logout-btn{display:flex;align-items:center;gap:10px;padding:11px 12px;border-radius:10px;cursor:pointer;color:var(--error);font-size:0.88rem;font-weight:500;width:100%;background:none;border:none;font-family:'Hind Siliguri',sans-serif;}
    .logout-btn:hover{background:rgba(255,82,82,0.08);}
    .main{margin-left:var(--sidebar-w);flex:1;display:flex;flex-direction:column;}
    .topbar{background:rgba(17,17,24,0.95);border-bottom:1px solid var(--border);padding:0 28px;height:64px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;backdrop-filter:blur(10px);}
    .topbar-left{display:flex;align-items:center;gap:12px;}
    .menu-toggle{display:none;background:none;border:none;color:var(--text);font-size:20px;cursor:pointer;}
    .page-title{font-size:1.1rem;font-weight:600;}
    .content{padding:28px;max-width:800px;}
    @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes countdown{from{stroke-dashoffset:0}to{stroke-dashoffset:157}}
    .loading-screen{position:fixed;inset:0;background:var(--dark);z-index:999;display:flex;align-items:center;justify-content:center;}
    .spin{width:32px;height:32px;border:3px solid rgba(245,197,24,0.2);border-top-color:var(--gold);border-radius:50%;animation:spin 0.8s linear infinite;}

    /* Summary bar */
    .summary-bar{background:linear-gradient(135deg,rgba(245,197,24,0.1),rgba(245,197,24,0.03));border:1px solid var(--border);border-radius:16px;padding:22px 28px;margin-bottom:24px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;animation:fadeUp 0.5s ease both;}
    .summary-info{display:flex;gap:24px;flex-wrap:wrap;}
    .s-item .lbl{font-size:0.75rem;color:var(--text-muted);margin-bottom:4px;}
    .s-item .val{font-size:1.2rem;font-weight:700;color:var(--gold);}
    .progress-outer{flex:1;max-width:200px;}
    .progress-label{display:flex;justify-content:space-between;font-size:0.75rem;color:var(--text-muted);margin-bottom:6px;}
    .progress-bar{height:8px;background:rgba(255,255,255,0.06);border-radius:4px;overflow:hidden;}
    .progress-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold-light));border-radius:4px;transition:width 0.5s ease;}

    /* No plan */
    .no-plan-box{background:var(--dark2);border:1px solid var(--border);border-radius:14px;padding:40px;text-align:center;}
    .no-plan-box .icon{font-size:3rem;margin-bottom:14px;}
    .no-plan-box h3{font-size:1.1rem;font-weight:700;margin-bottom:8px;}
    .no-plan-box p{font-size:0.85rem;color:var(--text-muted);margin-bottom:20px;}
    .btn-gold{padding:12px 24px;background:linear-gradient(135deg,var(--gold),var(--gold-dark));border:none;border-radius:10px;color:#000;font-family:'Hind Siliguri',sans-serif;font-size:0.9rem;font-weight:700;cursor:pointer;text-decoration:none;display:inline-block;}

    /* Task cards */
    .tasks-list{display:flex;flex-direction:column;gap:14px;margin-bottom:24px;}
    .task-card{background:var(--dark2);border:1px solid rgba(255,255,255,0.06);border-radius:14px;padding:20px;display:flex;align-items:center;gap:16px;transition:all 0.3s;animation:fadeUp 0.5s ease both;}
    .task-card.completed{border-color:rgba(0,230,118,0.2);background:rgba(0,230,118,0.03);}
    .task-card.locked{opacity:0.5;}
    .task-num{width:40px;height:40px;border-radius:50%;background:rgba(245,197,24,0.1);border:2px solid rgba(245,197,24,0.2);display:flex;align-items:center;justify-content:center;font-size:0.9rem;font-weight:700;color:var(--gold);flex-shrink:0;}
    .task-card.completed .task-num{background:rgba(0,230,118,0.1);border-color:rgba(0,230,118,0.3);color:var(--success);}
    .task-info{flex:1;}
    .task-title{font-size:0.92rem;font-weight:600;margin-bottom:4px;}
    .task-desc{font-size:0.78rem;color:var(--text-muted);}
    .task-reward{font-size:1rem;font-weight:700;color:var(--gold);margin-right:12px;white-space:nowrap;}
    .task-btn{padding:9px 18px;border:none;border-radius:8px;font-family:'Hind Siliguri',sans-serif;font-size:0.82rem;font-weight:700;cursor:pointer;transition:all 0.2s;white-space:nowrap;}
    .task-btn.watch{background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:#000;}
    .task-btn.watch:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(245,197,24,0.3);}
    .task-btn.done{background:rgba(0,230,118,0.1);color:var(--success);border:1px solid rgba(0,230,118,0.2);cursor:default;}
    .task-btn.waiting{background:rgba(255,255,255,0.06);color:var(--text-muted);cursor:not-allowed;}

    /* Timer modal */
    .timer-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:200;display:none;align-items:center;justify-content:center;backdrop-filter:blur(6px);}
    .timer-overlay.show{display:flex;}
    .timer-box{background:var(--dark2);border:1px solid var(--border);border-radius:20px;padding:40px;text-align:center;max-width:380px;width:90%;}
    .timer-title{font-size:1rem;font-weight:700;margin-bottom:6px;}
    .timer-sub{font-size:0.82rem;color:var(--text-muted);margin-bottom:28px;}
    .timer-circle{position:relative;width:120px;height:120px;margin:0 auto 24px;}
    .timer-circle svg{transform:rotate(-90deg);}
    .timer-circle circle{fill:none;stroke:rgba(255,255,255,0.06);stroke-width:8;}
    .timer-circle .progress-ring{stroke:var(--gold);stroke-width:8;stroke-linecap:round;stroke-dasharray:314;stroke-dashoffset:314;transition:stroke-dashoffset 1s linear;}
    .timer-number{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:2rem;font-weight:800;color:var(--gold);}
    .timer-label{font-size:0.75rem;color:var(--text-muted);margin-top:4px;}
    .complete-btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--gold),var(--gold-dark));border:none;border-radius:10px;color:#000;font-family:'Hind Siliguri',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;transition:all 0.2s;display:none;}
    .complete-btn.show{display:block;}
    .complete-btn:hover{transform:translateY(-1px);box-shadow:0 8px 25px rgba(245,197,24,0.3);}
    .watching-text{font-size:0.85rem;color:var(--text-muted);margin-top:12px;}

    /* All done */
    .all-done-box{background:linear-gradient(135deg,rgba(0,230,118,0.1),rgba(0,230,118,0.02));border:1px solid rgba(0,230,118,0.2);border-radius:14px;padding:32px;text-align:center;margin-bottom:24px;}
    .all-done-box h3{font-size:1.2rem;font-weight:700;color:var(--success);margin-bottom:8px;}
    .all-done-box p{font-size:0.85rem;color:var(--text-muted);}

    /* Next reset timer */
    .reset-box{background:var(--dark2);border:1px solid rgba(255,255,255,0.05);border-radius:12px;padding:16px 20px;display:flex;align-items:center;gap:12px;font-size:0.85rem;color:var(--text-muted);}
    .reset-box i{color:var(--gold);}
    .reset-time{color:var(--gold);font-weight:700;}

    .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:99;}
    .overlay.show{display:block;}
    @media(max-width:1100px){}
    @media(max-width:768px){.sidebar{transform:translateX(-100%);}.sidebar.open{transform:translateX(0);}.main{margin-left:0;}.menu-toggle{display:block;}.content{padding:16px;}.task-card{flex-wrap:wrap;}.summary-bar{flex-direction:column;}}
  </style>
</head>
<body>
<div class="loading-screen" id="loading-screen"><div class="spin"></div></div>
<div class="overlay" id="overlay" onclick="closeSidebar()"></div>

<!-- Timer Modal -->
<div class="timer-overlay" id="timerOverlay">
  <div class="timer-box">
    <div class="timer-title">Ad দেখুন 👀</div>
    <div class="timer-sub">৩০ সেকেন্ড ad দেখুন তারপর income পাবেন</div>
    <div class="timer-circle">
      <svg width="120" height="120" viewBox="0 0 120 120">
        <circle cx="60" cy="60" r="50"/>
        <circle class="progress-ring" id="progress-ring" cx="60" cy="60" r="50"/>
      </svg>
      <div class="timer-number" id="timer-num">30</div>
    </div>
    <div class="timer-label">সেকেন্ড বাকি</div>
    <div class="watching-text" id="watching-text">Ad tab টি খোলা রাখুন...</div>
    <button class="complete-btn" id="complete-btn" onclick="completeTask()">
      <i class="fas fa-check-circle"></i> ৳<span id="complete-reward">5</span> Income নিন!
    </button>
  </div>
</div>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo"><div class="logo-icon">💰</div><div class="logo-text">InvestBD</div></div>
  <div class="sidebar-user"><div class="avatar" id="sb-avatar">?</div><div><div style="font-size:0.9rem;font-weight:600;" id="sb-name">লোড...</div></div></div>
  <nav class="sidebar-nav">
    <div class="nav-section">
      <div class="nav-section-title">মূল মেনু</div>
      <a href="dashboard.html" class="nav-item"><i class="fas fa-th-large"></i> Dashboard</a>
      <a href="plans.html" class="nav-item"><i class="fas fa-layer-group"></i> Investment Plans</a>
      <a href="myplans.html" class="nav-item"><i class="fas fa-list-check"></i> আমার Plans</a>
      <a href="tasks.html" class="nav-item active"><i class="fas fa-tasks"></i> Daily Tasks</a>
      <a href="deposit.html" class="nav-item"><i class="fas fa-arrow-down-to-line"></i> Deposit</a>
      <a href="withdraw.html" class="nav-item"><i class="fas fa-arrow-up-from-line"></i> Withdraw</a>
    </div>
    <div class="nav-section">
      <div class="nav-section-title">আরও</div>
      <a href="referral.html" class="nav-item"><i class="fas fa-users"></i> Referral</a>
      <a href="profile.html" class="nav-item"><i class="fas fa-user-circle"></i> Profile</a>
      <a href="support.html" class="nav-item"><i class="fas fa-headset"></i> Support</a>
    </div>
  </nav>
  <div class="sidebar-bottom"><button class="logout-btn" id="logout-btn"><i class="fas fa-sign-out-alt"></i> লগআউট</button></div>
</aside>

<div class="main">
  <div class="topbar">
    <div class="topbar-left"><button class="menu-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button><div class="page-title">Daily Tasks</div></div>
  </div>
  <div class="content" id="main-content" style="display:none;"></div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";
  import { getFirestore, doc, getDoc, setDoc, updateDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCu-UBa4vCRLByPkQqlb5JjVvuHqMFPYxM",
    authDomain: "investbd-783df.firebaseapp.com",
    projectId: "investbd-783df",
    storageBucket: "investbd-783df.firebasestorage.app",
    messagingSenderId: "1043148979663",
    appId: "1:1043148979663:web:20465ee152597ce101e6ba"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  let currentUser = null;
  let userData = null;
  let taskSettings = null;
  let todayProgress = null;
  let currentTaskIndex = -1;
  let timerInterval = null;
  let adWindow = null;

  // Today's date key
  function todayKey() {
    const d = new Date();
    return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
  }

  // Get next midnight countdown
  function getNextMidnight() {
    const now = new Date();
    const midnight = new Date(now);
    midnight.setHours(24,0,0,0);
    const diff = midnight - now;
    const h = Math.floor(diff/3600000);
    const m = Math.floor((diff%3600000)/60000);
    const s = Math.floor((diff%60000)/1000);
    return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  }

  let authChecked = false;
  onAuthStateChanged(auth, async user => {
    if(authChecked) return;
    authChecked = true;
    if(!user){ window.location.replace('index.html'); return; }
    currentUser = user;

    // Load user data
    const userSnap = await getDoc(doc(db,'users',user.uid));
    if(!userSnap.exists()){ window.location.replace('index.html'); return; }
    userData = userSnap.data();
    document.getElementById('sb-avatar').textContent = userData.name.charAt(0).toUpperCase();
    document.getElementById('sb-name').textContent = userData.name;

    // Load task settings from Firebase (Admin এ set করা)
    try {
      const settingsSnap = await getDoc(doc(db,'settings','tasks'));
      if(settingsSnap.exists()){
        taskSettings = settingsSnap.data();
      } else {
        // Default settings
        taskSettings = { adLink: 'https://www.adsterra.com', rewardPerAd: 5, enabled: true };
      }
    } catch(e){ taskSettings = { adLink: 'https://www.adsterra.com', rewardPerAd: 5, enabled: true }; }

    // Load today's progress
    const progressSnap = await getDoc(doc(db,'taskProgress',`${user.uid}_${todayKey()}`));
    if(progressSnap.exists()){
      todayProgress = progressSnap.data();
    } else {
      todayProgress = { completedTasks: 0, earnedToday: 0, date: todayKey() };
    }

    // Check active plans
    const plansSnap = await getDocs(query(collection(db,'userPlans'),where('uid','==',user.uid),where('status','==','active')));
    const activePlans = [];
    plansSnap.forEach(d=>activePlans.push(d.data()));

    document.getElementById('loading-screen').style.display = 'none';
    document.getElementById('main-content').style.display = 'block';

    renderPage(activePlans);

    // Update countdown every second
    setInterval(()=>{
      const el = document.getElementById('reset-countdown');
      if(el) el.textContent = getNextMidnight();
    },1000);
  });

  document.getElementById('logout-btn').addEventListener('click', async()=>{ await signOut(auth); window.location.replace('index.html'); });

  function renderPage(activePlans) {
    const content = document.getElementById('main-content');

    // Task system বন্ধ থাকলে
    if(!taskSettings.enabled){
      content.innerHTML = `
        <div class="no-plan-box">
          <div class="icon">⏸</div>
          <h3>Tasks এখন বন্ধ আছে</h3>
          <p>Admin সাময়িকভাবে task system বন্ধ রেখেছেন। পরে আবার চেষ্টা করুন।</p>
        </div>`;
      return;
    }

    // কোনো active plan না থাকলে
    if(activePlans.length === 0){
      content.innerHTML = `
        <div class="no-plan-box">
          <div class="icon">📦</div>
          <h3>কোনো Active Plan নেই!</h3>
          <p>Daily tasks করতে হলে আগে একটা Investment Plan কিনতে হবে।</p>
          <a href="plans.html" class="btn-gold"><i class="fas fa-shopping-cart"></i> Plan কিনুন</a>
        </div>`;
      return;
    }

    // সব plan এর মোট daily tasks হিসাব
    let totalTasks = 0;
    let totalEarning = 0;
    activePlans.forEach(p=>{
      const planTasks = getPlanTasks(p.planName, p.dailyIncome);
      totalTasks += planTasks;
      totalEarning += p.dailyIncome;
    });

    const completed = todayProgress.completedTasks || 0;
    const remaining = Math.max(0, totalTasks - completed);
    const progress = totalTasks > 0 ? Math.round((completed/totalTasks)*100) : 0;
    const rewardPerTask = taskSettings.rewardPerAd || 5;

    // সব task complete হলে
    if(completed >= totalTasks){
      content.innerHTML = `
        <div class="all-done-box">
          <div style="font-size:3rem;margin-bottom:12px;">🎉</div>
          <h3>আজকের সব Task সম্পন্ন!</h3>
          <p>আপনি আজ ৳${(todayProgress.earnedToday||0).toLocaleString()} আয় করেছেন। আগামীকাল রাত ১২টায় নতুন task আসবে।</p>
        </div>
        <div class="reset-box">
          <i class="fas fa-clock"></i>
          <span>পরের task আসবে: <span class="reset-time" id="reset-countdown">${getNextMidnight()}</span> পরে</span>
        </div>`;
      return;
    }

    // Task list render
    let tasksHTML = '';
    for(let i=0; i<totalTasks; i++){
      const isCompleted = i < completed;
      const isNext = i === completed;
      const isLocked = i > completed;
      tasksHTML += `
        <div class="task-card ${isCompleted?'completed':''} ${isLocked?'locked':''}">
          <div class="task-num">${isCompleted?'<i class="fas fa-check"></i>':i+1}</div>
          <div class="task-info">
            <div class="task-title">Ad দেখুন — Task ${i+1}</div>
            <div class="task-desc">${isCompleted?'সম্পন্ন ✅':isNext?'৩০ সেকেন্ড ad দেখুন':'আগের task সম্পন্ন করুন'}</div>
          </div>
          <div class="task-reward">+৳${rewardPerTask}</div>
          ${isCompleted
            ? `<button class="task-btn done">✅ সম্পন্ন</button>`
            : isNext
              ? `<button class="task-btn watch" onclick="startTask(${i},${rewardPerTask})"><i class="fas fa-play"></i> শুরু করুন</button>`
              : `<button class="task-btn waiting">🔒 Locked</button>`
          }
        </div>`;
    }

    content.innerHTML = `
      <div class="summary-bar">
        <div class="summary-info">
          <div class="s-item"><div class="lbl">আজকের আয়</div><div class="val">৳${(todayProgress.earnedToday||0).toLocaleString()}</div></div>
          <div class="s-item"><div class="lbl">বাকি Tasks</div><div class="val">${remaining}টি</div></div>
          <div class="s-item"><div class="lbl">প্রতি Task</div><div class="val">৳${rewardPerTask}</div></div>
          <div class="s-item"><div class="lbl">মোট সম্ভাব্য আয়</div><div class="val">৳${(totalTasks*rewardPerTask).toLocaleString()}</div></div>
        </div>
        <div class="progress-outer">
          <div class="progress-label"><span>অগ্রগতি</span><span>${completed}/${totalTasks}</span></div>
          <div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>
        </div>
      </div>
      <div class="tasks-list">${tasksHTML}</div>
      <div class="reset-box">
        <i class="fas fa-clock"></i>
        <span>নতুন task আসবে: <span class="reset-time" id="reset-countdown">${getNextMidnight()}</span> পরে</span>
      </div>`;
  }

  // Plan অনুযায়ী task সংখ্যা হিসাব
  function getPlanTasks(planName, dailyIncome) {
    const rewardPerTask = taskSettings.rewardPerAd || 5;
    return Math.ceil(dailyIncome / rewardPerTask);
  }

  // Task শুরু করো
  window.startTask = function(index, reward) {
    currentTaskIndex = index;
    document.getElementById('complete-reward').textContent = reward;
    document.getElementById('complete-btn').classList.remove('show');
    document.getElementById('watching-text').textContent = 'Ad tab টি খোলা রাখুন...';

    // Ad নতুন tab এ খোলো
    const adLink = taskSettings.adLink || 'https://www.adsterra.com';
    adWindow = window.open(adLink, '_blank');

    // Timer শুরু করো
    document.getElementById('timerOverlay').classList.add('show');
    startTimer(30, reward);
  }

  function startTimer(seconds, reward) {
    let remaining = seconds;
    const ring = document.getElementById('progress-ring');
    const numEl = document.getElementById('timer-num');
    const circumference = 314;

    if(timerInterval) clearInterval(timerInterval);

    timerInterval = setInterval(()=>{
      remaining--;
      numEl.textContent = remaining;
      const offset = circumference - (circumference * (seconds - remaining) / seconds);
      ring.style.strokeDashoffset = offset;

      if(remaining <= 0){
        clearInterval(timerInterval);
        numEl.textContent = '✓';
        ring.style.stroke = 'var(--success)';
        document.getElementById('watching-text').textContent = 'দেখা সম্পন্ন! নিচে click করুন।';
        document.getElementById('complete-btn').classList.add('show');
      }
    }, 1000);
  }

  // Task complete করো
  window.completeTask = async function() {
    clearInterval(timerInterval);
    document.getElementById('timerOverlay').classList.remove('show');

    const rewardPerTask = taskSettings.rewardPerAd || 5;

    try {
      // Balance update
      const userSnap = await getDoc(doc(db,'users',currentUser.uid));
      const currentBalance = userSnap.data().balance || 0;
      const currentEarned = userSnap.data().totalEarned || 0;

      await updateDoc(doc(db,'users',currentUser.uid),{
        balance: currentBalance + rewardPerTask,
        totalEarned: currentEarned + rewardPerTask
      });

      // Progress update
      const newCompleted = (todayProgress.completedTasks||0) + 1;
      const newEarned = (todayProgress.earnedToday||0) + rewardPerTask;
      todayProgress.completedTasks = newCompleted;
      todayProgress.earnedToday = newEarned;

      await setDoc(doc(db,'taskProgress',`${currentUser.uid}_${todayKey()}`),{
        uid: currentUser.uid,
        completedTasks: newCompleted,
        earnedToday: newEarned,
        date: todayKey(),
        updatedAt: new Date().toISOString()
      });

      // UI refresh
      userData.balance = currentBalance + rewardPerTask;

      // Active plans reload করে page re-render
      const plansSnap = await getDocs(query(collection(db,'userPlans'),where('uid','==',currentUser.uid),where('status','==','active')));
      const activePlans = [];
      plansSnap.forEach(d=>activePlans.push(d.data()));
      renderPage(activePlans);

    } catch(e){
      console.error(e);
      alert('সমস্যা হয়েছে। আবার চেষ্টা করুন।');
    }
  }

  window.toggleSidebar=()=>{document.getElementById('sidebar').classList.toggle('open');document.getElementById('overlay').classList.toggle('show');}
  window.closeSidebar=()=>{document.getElementById('sidebar').classList.remove('open');document.getElementById('overlay').classList.remove('show');}
</script>
</body>
</html>
