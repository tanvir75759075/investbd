<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>InvestBD - আমার Plans</title>
  <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
  <style>
    :root{--gold:#f5c518;--gold-light:#ffd84d;--gold-dark:#c9a000;--dark:#0a0a0f;--dark2:#111118;--text:#e8e8f0;--text-muted:#888899;--success:#00e676;--error:#ff5252;--warning:#ffab40;--border:rgba(245,197,24,0.15);--sidebar-w:260px;}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Hind Siliguri',sans-serif;background:var(--dark);color:var(--text);min-height:100vh;display:flex;}
    .sidebar{width:var(--sidebar-w);background:var(--dark2);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:100;transition:transform 0.3s;}
    .sidebar-logo{padding:24px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;}
    .sidebar-logo .logo-icon{width:42px;height:42px;background:linear-gradient(135deg,var(--gold),var(--gold-dark));border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;}
    .sidebar-logo .logo-text{font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:800;background:linear-gradient(135deg,var(--gold-light),var(--gold-dark));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
    .sidebar-user{padding:20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;}
    .avatar{width:44px;height:44px;background:linear-gradient(135deg,var(--gold),var(--gold-dark));border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:#000;flex-shrink:0;}
    .sidebar-nav{flex:1;padding:16px 12px;overflow-y:auto;}
    .nav-section{margin-bottom:24px;}
    .nav-section-title{font-size:0.68rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:1.5px;padding:0 8px;margin-bottom:8px;}
    .nav-item{display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:10px;cursor:pointer;transition:all 0.2s;color:var(--text-muted);font-size:0.88rem;font-weight:500;margin-bottom:2px;text-decoration:none;}
    .nav-item i{width:18px;text-align:center;font-size:15px;}
    .nav-item:hover{background:rgba(245,197,24,0.06);color:var(--text);}
    .nav-item.active{background:rgba(245,197,24,0.1);color:var(--gold);border:1px solid rgba(245,197,24,0.15);}
    .sidebar-bottom{padding:16px 12px;border-top:1px solid var(--border);}
    .logout-btn{display:flex;align-items:center;gap:10px;padding:11px 12px;border-radius:10px;cursor:pointer;color:var(--error);font-size:0.88rem;font-weight:500;width:100%;background:none;border:none;font-family:'Hind Siliguri',sans-serif;}
    .logout-btn:hover{background:rgba(255,82,82,0.08);}
    .main{margin-left:var(--sidebar-w);flex:1;display:flex;flex-direction:column;}
    .topbar{background:rgba(17,17,24,0.95);border-bottom:1px solid var(--border);padding:0 28px;height:64px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;backdrop-filter:blur(10px);}
    .topbar-left{display:flex;align-items:center;gap:12px;}
    .menu-toggle{display:none;background:none;border:none;color:var(--text);font-size:20px;cursor:pointer;}
    .page-title{font-size:1.1rem;font-weight:600;}
    .content{padding:28px;}
    @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
    @keyframes spin{to{transform:rotate(360deg)}}
    .loading-screen{position:fixed;inset:0;background:var(--dark);z-index:999;display:flex;align-items:center;justify-content:center;}
    .spin{width:32px;height:32px;border:3px solid rgba(245,197,24,0.2);border-top-color:var(--gold);border-radius:50%;animation:spin 0.8s linear infinite;}
    .plans-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-bottom:28px;}
    .plan-card{background:var(--dark2);border:1px solid rgba(255,255,255,0.06);border-radius:16px;overflow:hidden;animation:fadeUp 0.6s ease both;}
    .plan-card.active-plan{border-color:rgba(245,197,24,0.3);box-shadow:0 0 20px rgba(245,197,24,0.06);}
    .plan-card.expired-plan{opacity:0.6;}
    .plan-header{padding:20px;border-bottom:1px solid rgba(255,255,255,0.05);display:flex;justify-content:space-between;align-items:center;}
    .plan-name{font-size:1rem;font-weight:700;}
    .plan-badge{font-size:0.7rem;padding:3px 10px;border-radius:20px;font-weight:600;}
    .plan-badge.active{background:rgba(0,230,118,0.1);color:var(--success);border:1px solid rgba(0,230,118,0.2);}
    .plan-badge.expired{background:rgba(255,82,82,0.1);color:var(--error);border:1px solid rgba(255,82,82,0.2);}
    .plan-body{padding:20px;}
    .plan-stat{display:flex;justify-content:space-between;align-items:center;padding:8px 0;font-size:0.83rem;border-bottom:1px solid rgba(255,255,255,0.03);}
    .plan-stat:last-child{border-bottom:none;}
    .plan-stat .lbl{color:var(--text-muted);}
    .plan-stat .val{font-weight:600;}
    .progress-wrap{margin-top:14px;}
    .progress-label{display:flex;justify-content:space-between;font-size:0.75rem;color:var(--text-muted);margin-bottom:6px;}
    .progress-bar{height:6px;background:rgba(255,255,255,0.06);border-radius:3px;overflow:hidden;}
    .progress-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold-light));border-radius:3px;transition:width 1s ease;}
    .empty-state{text-align:center;padding:60px 20px;color:var(--text-muted);}
    .empty-state .icon{font-size:3rem;margin-bottom:16px;}
    .empty-state h3{font-size:1.1rem;font-weight:600;margin-bottom:8px;color:var(--text);}
    .empty-state p{font-size:0.85rem;margin-bottom:20px;}
    .btn-gold{padding:12px 24px;background:linear-gradient(135deg,var(--gold),var(--gold-dark));border:none;border-radius:10px;color:#000;font-family:'Hind Siliguri',sans-serif;font-size:0.9rem;font-weight:700;cursor:pointer;text-decoration:none;display:inline-block;}
    .tabs-bar{display:flex;gap:4px;background:var(--dark2);border:1px solid var(--border);border-radius:12px;padding:4px;margin-bottom:24px;width:fit-content;}
    .ptab{padding:9px 20px;border-radius:9px;cursor:pointer;font-size:0.85rem;font-weight:600;color:var(--text-muted);transition:all 0.2s;}
    .ptab.active{background:rgba(245,197,24,0.1);color:var(--gold);border:1px solid rgba(245,197,24,0.15);}
    .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:99;}
    .overlay.show{display:block;}
    @media(max-width:1100px){.plans-grid{grid-template-columns:repeat(2,1fr);}}
    @media(max-width:768px){.sidebar{transform:translateX(-100%);}.sidebar.open{transform:translateX(0);}.main{margin-left:0;}.menu-toggle{display:block;}.content{padding:16px;}.plans-grid{grid-template-columns:1fr;}}
  </style>
</head>
<body>
<div class="loading-screen" id="loading-screen"><div class="spin"></div></div>
<div class="overlay" id="overlay" onclick="closeSidebar()"></div>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo"><div class="logo-icon">💰</div><div class="logo-text">InvestBD</div></div>
  <div class="sidebar-user"><div class="avatar" id="sb-avatar">?</div><div><div style="font-size:0.9rem;font-weight:600;" id="sb-name">লোড...</div></div></div>
  <nav class="sidebar-nav">
    <div class="nav-section">
      <div class="nav-section-title">মূল মেনু</div>
      <a href="dashboard.html" class="nav-item"><i class="fas fa-th-large"></i> Dashboard</a>
      <a href="plans.html" class="nav-item"><i class="fas fa-layer-group"></i> Investment Plans</a>
      <a href="myplans.html" class="nav-item active"><i class="fas fa-list-check"></i> আমার Plans</a>
      <a href="deposit.html" class="nav-item"><i class="fas fa-arrow-down-to-line"></i> Deposit</a>
      <a href="withdraw.html" class="nav-item"><i class="fas fa-arrow-up-from-line"></i> Withdraw</a>
    </div>
    <div class="nav-section">
      <div class="nav-section-title">আরও</div>
      <a href="referral.html" class="nav-item"><i class="fas fa-users"></i> Referral</a>
      <a href="profile.html" class="nav-item"><i class="fas fa-user-circle"></i> Profile</a>
      <a href="support.html" class="nav-item"><i class="fas fa-headset"></i> Support</a>
    </div>
  </nav>
  <div class="sidebar-bottom"><button class="logout-btn" id="logout-btn"><i class="fas fa-sign-out-alt"></i> লগআউট</button></div>
</aside>

<div class="main">
  <div class="topbar">
    <div class="topbar-left"><button class="menu-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button><div class="page-title">আমার Plans</div></div>
  </div>
  <div class="content" id="main-content" style="display:none;">
    <div class="tabs-bar">
      <div class="ptab active" id="tab-active" onclick="showTab('active')"><i class="fas fa-bolt"></i> Active Plans</div>
      <div class="ptab" id="tab-all" onclick="showTab('all')"><i class="fas fa-history"></i> সব Plans</div>
    </div>
    <div id="plans-container"></div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";
  import { getFirestore, doc, getDoc, collection, query, where, getDocs, orderBy } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCu-UBa4vCRLByPkQqlb5JjVvuHqMFPYxM",
    authDomain: "investbd-783df.firebaseapp.com",
    projectId: "investbd-783df",
    storageBucket: "investbd-783df.firebasestorage.app",
    messagingSenderId: "1043148979663",
    appId: "1:1043148979663:web:20465ee152597ce101e6ba"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  let allPlans = [];
  let currentTab = 'active';

  let authChecked = false;
  onAuthStateChanged(auth, async user => {
    if(authChecked) return;
    authChecked = true;
    if(!user){ window.location.replace('index.html'); return; }

    const userSnap = await getDoc(doc(db,'users',user.uid));
    if(userSnap.exists()){
      const d = userSnap.data();
      document.getElementById('sb-avatar').textContent = d.name.charAt(0).toUpperCase();
      document.getElementById('sb-name').textContent = d.name;
    }

    try {
      const snap = await getDocs(query(collection(db,'userPlans'), where('uid','==',user.uid)));
      allPlans = [];
      snap.forEach(d=>allPlans.push({id:d.id,...d.data()}));
      allPlans.sort((a,b)=>new Date(b.startDate)-new Date(a.startDate));
    } catch(e){ console.error(e); }

    renderPlans();
    document.getElementById('loading-screen').style.display = 'none';
    document.getElementById('main-content').style.display = 'block';
  });

  document.getElementById('logout-btn').addEventListener('click', async()=>{ await signOut(auth); window.location.replace('index.html'); });

  window.showTab = function(tab) {
    currentTab = tab;
    document.querySelectorAll('.ptab').forEach(t=>t.classList.remove('active'));
    document.getElementById('tab-'+tab).classList.add('active');
    renderPlans();
  }

  function renderPlans() {
    const container = document.getElementById('plans-container');
    const plans = currentTab === 'active'
      ? allPlans.filter(p=>p.status==='active')
      : allPlans;

    if(!plans.length){
      container.innerHTML = `
        <div class="empty-state">
          <div class="icon">📦</div>
          <h3>${currentTab==='active'?'কোনো Active Plan নেই':'কোনো Plan কেনা হয়নি'}</h3>
          <p>${currentTab==='active'?'এখনো কোনো plan active নেই।':'আপনি এখনো কোনো plan কেনেননি।'}</p>
          <a href="plans.html" class="btn-gold"><i class="fas fa-shopping-cart"></i> Plan কিনুন</a>
        </div>`;
      return;
    }

    container.innerHTML = `<div class="plans-grid">${plans.map((p,i)=>{
      const startDate = p.startDate ? new Date(p.startDate) : new Date();
      const totalDays = p.days || 30;
      const daysLeft = p.daysLeft || 0;
      const daysUsed = totalDays - daysLeft;
      const progress = Math.round((daysUsed/totalDays)*100);
      const isActive = p.status === 'active';
      return `
        <div class="plan-card ${isActive?'active-plan':'expired-plan'}" style="animation-delay:${i*0.05}s">
          <div class="plan-header">
            <div class="plan-name">${p.planName||'Plan'}</div>
            <span class="plan-badge ${isActive?'active':'expired'}">${isActive?'● Active':'সম্পন্ন'}</span>
          </div>
          <div class="plan-body">
            <div class="plan-stat"><span class="lbl">বিনিয়োগ</span><span class="val" style="color:var(--gold);">৳${(p.invest||0).toLocaleString()}</span></div>
            <div class="plan-stat"><span class="lbl">দৈনিক আয়</span><span class="val" style="color:var(--success);">৳${(p.dailyIncome||0).toLocaleString()}/দিন</span></div>
            <div class="plan-stat"><span class="lbl">মোট আয়</span><span class="val" style="color:var(--gold);">৳${((p.dailyIncome||0)*(p.days||30)).toLocaleString()}</span></div>
            <div class="plan-stat"><span class="lbl">বাকি দিন</span><span class="val">${daysLeft} দিন</span></div>
            <div class="plan-stat"><span class="lbl">শুরু</span><span class="val">${startDate.toLocaleDateString('bn-BD')}</span></div>
            <div class="progress-wrap">
              <div class="progress-label"><span>অগ্রগতি</span><span>${progress}%</span></div>
              <div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>
            </div>
          </div>
        </div>`;
    }).join('')}</div>`;
  }

  window.toggleSidebar=()=>{document.getElementById('sidebar').classList.toggle('open');document.getElementById('overlay').classList.toggle('show');}
  window.closeSidebar=()=>{document.getElementById('sidebar').classList.remove('open');document.getElementById('overlay').classList.remove('show');}
</script>
</body>
</html>
